<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMPC — Gestão de Projetos</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    #loading-screen {
      position: fixed; inset: 0; background: #F2F3F2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;
    }
    #loading-screen .spin {
      width: 40px; height: 40px; border: 4px solid #E2E5E2;
      border-top-color: #7AB531; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { color: #58595B; font-family: sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="spin"></div>
    <p>Carregando dados...</p>
  </div>

  <div id="app"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Libraries -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- App core -->
  <script src="js/utils.js"></script>
  <script src="js/firebase.js"></script>
  <script src="import_projects.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/store.js"></script>

  <!-- Views -->
  <script src="views/Dashboard.js"></script>
  <script src="views/ProjectList.js"></script>
  <script src="views/ProjectDetail.js"></script>
  <script src="views/PurchaseList.js"></script>
  <script src="views/PurchaseDetail.js"></script>
  <script src="views/TaskBoard.js"></script>
  <script src="views/Portfolio.js"></script>
  <script src="views/Procurement.js"></script>
  <script src="views/Rateio.js"></script>
  <script src="views/Obras.js"></script>
  <script src="views/Cronograma.js"></script>
  <script src="views/Orientacoes.js"></script>
  <script src="views/Settings.js"></script>

  <!-- Boot -->
  <script src="js/app.js"></script>
</body>
</html>
